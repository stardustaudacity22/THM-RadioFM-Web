<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>THM FM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Calibri, Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 25px;
        }

        .logo img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }

        /* --- New Tagline Styles --- */
        .tagline {
            font-size: 1rem;
            line-height: 1.4;
            color: #333;
            margin: -15px 0; /* Adjusts the gap caused by the container gap */
        }
        
        .tagline p {
            margin: 0; /* Remove default paragraph margins */
        }
        /* --- End Tagline Styles --- */

        audio {
            width: 300px;
            max-width: 90%;
            border-radius: 6px;
        }

        .main-nav {
            margin-top: 30px;
        }
        
        .main-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 0px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-nav a {
            text-decoration: none;
            color: #000000;
            padding: 0 10px;
        }
        
        .main-nav a:hover {
            text-decoration: underline;
        }

        .main-nav li:not(:last-child) a {
            border-right: 1px solid #ccc; 
        }
        
        /* The .complaints styles are no longer needed for any HTML element */
        /* .complaints a:hover {
            text-decoration: underline;
        } */

</head>

        <audio controls autoplay>
