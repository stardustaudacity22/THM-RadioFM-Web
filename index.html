<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <!-- Page title (shows in browser tab & Google) -->
    <title>THM FM – Trouble Honey Music Radio</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO meta -->
    <meta name="description" content="Jou nommer #1 vir Pinkster liedjies, net hier op Trouble Honey Music. Luister regstreeks na THM FM. Nie geaffilieer met Lede in Christus Kerk nie.">
    <meta name="author" content="Trouble Honey Music">

    <!-- Favicon (browser tab icon) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logp.jpg">

    <!-- Open Graph (Google / Facebook / WhatsApp previews) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="THM FM – Trouble Honey Music Radio">
    <meta property="og:description" content="Jou nommer #1 vir Pinkster liedjies. Luister regstreeks na THM FM.">
    <meta property="og:url" content="https://fm.troublehoneymusic.co.za/">
    <meta property="og:image" content="https://fm.troublehoneymusic.co.za/logo.jpg">

    <!-- Structured Data: tells Google your site name + logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "THM FM – Trouble Honey Music",
      "url": "https://fm.troublehoneymusic.co.za/",
      "logo": "https://fm.troublehoneymusic.co.za/logo.jpg"
    }
    </script>

    <style>
        body {
            margin: 0;
            font-family: Calibri, Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 25px;
        }

        .logo img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }

        .tagline {
            font-size: 1rem;
            line-height: 1.4;
            color: #333;
            margin: -15px 0;
        }
        
        .tagline p {
            margin: 0;
        }

        audio {
            width: 300px;
            max-width: 90%;
            border-radius: 6px;
        }

        .main-nav {
            margin-top: 30px;
        }
        
        .main-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-nav a {
            text-decoration: none;
            color: #000000;
            padding: 0 10px;
        }
        
        .main-nav a:hover {
            text-decoration: underline;
        }

        .main-nav li:not(:last-child) a {
            border-right: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="logo.jpg" alt="THM FM Logo">
        </div>

        <div class="tagline">
            <p>Jou nommer #1 vir Pinkster liedjies, net hier op Trouble Honey Music.</p>
            <p>Nie geaffilieer met Lede in Christus Kerk nie.</p>
        </div>

        <audio controls autoplay aria-label="THM FM Live Stream">
            <source src="https://stream.zeno.fm/1i5nz61afovtv" type="audio/mpeg">
        </audio>
        
        <nav class="main-nav" aria-label="Main navigation">
            <ul>
                <li><a href="https://www.troublehoneymusic.co.za">Home</a></li>
                <li><a href="https://www.troublehoneymusic.co.za/p/search.html">Search</a></li>
                <li><a href="https://fm.troublehoneymusic.co.za/">Radio</a></li>
                <li><a href="https://github.com/RAvanTonder/THM-RadioFM-Web/">Source Code</a></li>
                <li><a href="https://www.logue.net/xp/index.htm">Chord Transposer</a></li>
                <li><a href="https://troublehoneymusic.blogspot.com/p/donate.html">Donate</a></li>
                <li><a href="https://troublehoneymusic.blogspot.com/p/request.html">Request</a></li>
                <li><a href="https://troublehoneymusic.blogspot.com/p/contact-us.html">Contact Us</a></li>
                <li><a href="https://troublehoneymusic.blogspot.com/p/about-us.html">About Us</a></li>
            </ul>
        </nav>

    </div>

</body>
</html>
