<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>TroubleHoneyMusic FM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo img {
            max-width: 320px;
            width: 100%;
            height: auto;
            margin-bottom: 30px;
        }

        .player {
            max-width: 600px;
            margin: 0 auto;
        }

        audio {
            width: 100%;
            border-radius: 6px;
        }

        .tagline {
            margin-top: 20px;
            font-size: 14px;
            letter-spacing: 1px;
            color: #777;
        }

        footer {
            margin-top: 60px;
            font-size: 12px;
        }

        footer a {
            color: #555;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="logo.jpg" alt="TroubleHoneyMusic FM">
        </div>

        <div class="player">
            <audio controls>
                <source src="https://stream.zeno.fm/1i5nz61afovtv" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="tagline">
            YOUR SOUND. YOUR STATION.
        </div>

        <footer>
            <a href="#">Complaints Procedure</a>
        </footer>

    </div>

</body>
</html>
