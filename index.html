<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>THM FM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Calibri, Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 25px;
        }

        .logo img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }

        audio {
            width: 300px;
            max-width: 90%;
            border-radius: 6px;
        }

        /* --- New Menu Styles --- */
        .main-nav ul {
            list-style: none; /* Removes bullet points */
            padding: 0;
            margin: 0;
            display: flex; /* Aligns list items horizontally */
            gap: 15px; /* Adds space between items */
            flex-wrap: wrap; /* Allows menu to wrap on small screens */
            justify-content: center;
        }

        .main-nav a {
            text-decoration: none; /* Removes default link underline */
            color: #000000;
            padding: 0 5px; /* Adds clickable area */
        }
        
        .main-nav a:hover {
            text-decoration: underline;
        }

        /* Optional: Add vertical dividers like | Home | Search | */
        .main-nav li:not(:last-child) a {
            border-right: 1px solid #ccc; 
        }
        
        .complaints a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="logo.jpg" alt="THM FM">
        </div>

        <audio controls autoplay>
            <source src="https://stream.zeno.fm/1i5nz61afovtv" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <!-- New Menu HTML Structure -->
        <nav class="main-nav">
            <ul>
                <li><a href="https://www.troublehoneymusic.co.za">Home</a></li>
                <li><a href="#">Search</a></li>
                <li><a href="#">Radio</a></li>
                <li><a href="#">Chord Transposer</a></li>
                <li><a href="#">Donate</a></li>
                <li><a href="#">Request</a></li>
                <li><a href="#">Contact Us</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </nav>
        <!-- End New Menu Structure -->

        <!-- Keeping original complaints div, though it's redundant now -->
        <div class="complaints">
            <a href="https://www.troublehoneymusic.co.za">Home</a>
        </div>

    </div>

</body>
</html>
