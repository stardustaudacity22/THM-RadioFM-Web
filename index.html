<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>THM FM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Calibri, Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 25px;
        }

        .logo img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }

        audio {
            width: 300px;
            max-width: 90%;
            border-radius: 6px;
        }

        .complaints a {
            font-size: 12px;
            text-decoration: none;
            color: #333;
        }

        .complaints a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="logo.jpg" alt="THM FM">
        </div>

        <audio controls autoplay>
            <source src="https://stream.zeno.fm/1i5nz61afovtv" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="complaints">
            <a href="lfmcp.pdf" target="_blank">COMPLAINTS PROCEDURE</a>
        </div>

    </div>

</body>
</html>
